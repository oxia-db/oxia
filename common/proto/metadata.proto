syntax = "proto3";

package io.oxia.proto.v1;

option go_package = "github.com/oxia-db/oxia/common/proto";

message DataServerIdentity {
  optional string name = 1;
  string public = 2;
  string internal = 3;
}

message DataServerMetadata {
  map<string, string> labels = 1;
}

message DataServer {
  DataServerIdentity identity = 1;
  DataServerMetadata metadata = 2;
}

message AntiAffinity {
  repeated string labels = 1;
  string mode = 2;
}

message HierarchyPolicies {
  repeated AntiAffinity antiAffinities = 1;
}

message Namespace {
  string name = 1;
  uint32 initialShardCount = 2;
  uint32 replicationFactor = 3;
  optional bool notificationsEnabled = 4;
  string keySorting = 5;
  HierarchyPolicies policy = 6;
}

message LoadBalancer {
  string scheduleInterval = 1;
  string quarantineTime = 2;
}

message ClusterConfiguration {
  repeated Namespace namespaces = 1;
  repeated DataServerIdentity servers = 2;
  repeated string allowExtraAuthorities = 3;
  map<string, DataServerMetadata> serverMetadata = 4;
  LoadBalancer loadBalancer = 5;
}

message HashRange {
  uint32 min = 1;
  uint32 max = 2;
}

message SplitMetadata {
  string phase = 1;
  int64 parentShardId = 2;
  repeated int64 childShardIds = 3;
  uint32 splitPoint = 4;
  int64 snapshotOffset = 5;
  int64 parentTermAtBootstrap = 6;
  map<int64, string> childLeadersAtBootstrap = 7;
}

message ShardMetadata {
  string status = 1;
  int64 term = 2;
  DataServerIdentity leader = 3;
  repeated DataServerIdentity ensemble = 4;
  repeated DataServerIdentity removedNodes = 5;
  repeated DataServerIdentity pendingDeleteShardNodes = 6;
  HashRange int32HashRange = 7;
  SplitMetadata split = 8;
}

message NamespaceStatus {
  uint32 replicationFactor = 1;
  map<int64, ShardMetadata> shards = 2;
}

message ClusterStatus {
  map<string, NamespaceStatus> namespaces = 1;
  int64 shardIdGenerator = 2;
  uint32 serverIdx = 3;
  string instanceId = 4;
}
