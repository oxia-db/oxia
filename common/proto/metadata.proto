syntax = "proto3";

package io.oxia.proto.v1;

option go_package = "github.com/oxia-db/oxia/common/proto";

message DataServer {
  optional string name = 1;
  string public = 2;
  string internal = 3;
}

message DataServerMetadata {
  map<string, string> labels = 1;
}

message DataServerInfo {
  DataServer dataServer = 1;
  DataServerMetadata metadata = 2;
}

message AntiAffinity {
  repeated string labels = 1;
  string mode = 2;
}

message HierarchyPolicies {
  repeated AntiAffinity antiAffinities = 1;
}

message Namespace {
  string name = 1;
  uint32 initialShardCount = 2;
  uint32 replicationFactor = 3;
  optional bool notificationsEnabled = 4;
  string keySorting = 5;
  HierarchyPolicies policy = 6;
}

message LoadBalancer {
  string scheduleInterval = 1;
  string quarantineTime = 2;
}

message ClusterConfiguration {
  repeated Namespace namespaces = 1;
  repeated DataServer servers = 2;
  repeated string allowExtraAuthorities = 3;
  map<string, DataServerMetadata> serverMetadata = 4;
  LoadBalancer loadBalancer = 5;
}
