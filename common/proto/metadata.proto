syntax = "proto3";

package io.oxia.proto.v1;

option go_package = "github.com/oxia-db/oxia/common/proto";

message DataServerIdentity {
  optional string name = 1;
  string public = 2;
  string internal = 3;
}

message DataServerMetadata {
  map<string, string> labels = 1;
}

message DataServer {
  DataServerIdentity identity = 1;
  DataServerMetadata metadata = 2;
}

message AntiAffinity {
  repeated string labels = 1;
  string mode = 2;
}

message Namespace {
  string name = 1;
  uint32 initial_shard_count = 2;
  uint32 replication_factor = 3;
  optional bool notifications_enabled = 4;
  string key_sorting = 5;
  repeated AntiAffinity anti_affinities = 6;
}

message LoadBalancer {
  string schedule_interval = 1;
  string quarantine_time = 2;
}

message ClusterConfiguration {
  repeated Namespace namespaces = 1;
  repeated DataServerIdentity servers = 2;
  repeated string allow_extra_authorities = 3;
  map<string, DataServerMetadata> server_metadata = 4;
  LoadBalancer load_balancer = 5;
}

message HashRange {
  uint32 min = 1;
  uint32 max = 2;
}

enum SplitPhase {
  Bootstrap = 0;
  CatchUp = 1;
  Cutover = 2;
}

message SplitMetadata {
  SplitPhase phase = 1;
  int64 parent_shard_id = 2;
  repeated int64 child_shard_ids = 3;
  uint32 split_point = 4;
  int64 snapshot_offset = 5;
  int64 parent_term_at_bootstrap = 6;
  map<int64, string> child_leaders_at_bootstrap = 7;
}

enum ShardStatus {
  ShardStatusUnknown = 0;
  SteadyState = 1;
  Election = 2;
  Deleting = 3;
}

message ShardMetadata {
  ShardStatus status = 1;
  int64 term = 2;
  DataServerIdentity leader = 3;
  repeated DataServerIdentity ensemble = 4;
  repeated DataServerIdentity removed_nodes = 5;
  repeated DataServerIdentity pending_delete_shard_nodes = 6;
  HashRange int32_hash_range = 7;
  SplitMetadata split = 8;
}

message NamespaceStatus {
  uint32 replication_factor = 1;
  map<int64, ShardMetadata> shards = 2;
}

message ClusterStatus {
  map<string, NamespaceStatus> namespaces = 1;
  int64 shard_id_generator = 2;
  uint32 server_idx = 3;
  string instance_id = 4;
}
