syntax = "proto3";

package replication;

import "client.proto";

option go_package = "github.com/oxia-db/oxia/common/proto";

// coordinator -> node
service OxiaCoordination {
  rpc PushShardAssignments(stream io.oxia.proto.v1.ShardAssignments)
      returns (CoordinationShardAssignmentsResponse);

  rpc NewTerm(NewTermRequest) returns (NewTermResponse);
  rpc BecomeLeader(BecomeLeaderRequest) returns (BecomeLeaderResponse);
  rpc AddFollower(AddFollowerRequest) returns (AddFollowerResponse);

  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc DeleteShard(DeleteShardRequest) returns (DeleteShardResponse);
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);
  // Deprecated: use Handshake for node initialization and feature discovery.
  // Keep GetInfo only so new coordinators can fall back to older dataservers
  // during rolling upgrades, and remove it in the next major version.
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);

  // Removes an observer follower from the parent leader without fencing.
  // Used during split abort to cleanly stop data streaming to children.
  rpc RemoveObserver(RemoveObserverRequest) returns (RemoveObserverResponse);
}

// node (leader) -> node (follower)
service OxiaLogReplication {
  rpc Truncate(TruncateRequest) returns (TruncateResponse);
  rpc Replicate(stream Append) returns (stream Ack);
  rpc SendSnapshot(stream SnapshotChunk) returns (SnapshotResponse);
}


// Feature represents a capability that can be negotiated during leader election.
// This enables safe rolling upgrades where new and old nodes can coexist.
enum Feature {
  FEATURE_UNKNOWN = 0;
  FEATURE_DB_CHECKSUM = 1;
}

message GetInfoRequest {

}

message GetInfoResponse {
    repeated Feature features_supported = 1;
}

enum HandshakeStatus {
  HANDSHAKE_STATUS_UNKNOWN = 0;
  HANDSHAKE_STATUS_BOUND = 1;
  HANDSHAKE_STATUS_ALREADY_BOUND = 2;
  HANDSHAKE_STATUS_MISMATCH = 3;
}

message HandshakeRequest {
  string instance_id = 1;
}

message HandshakeResponse {
  HandshakeStatus status = 1;
  repeated Feature features_supported = 2;
}

message CoordinationShardAssignmentsResponse {}

message EntryId {
  int64 term = 1;
  int64 offset = 2;
}

message LogEntry {
  int64 term = 1;
  int64 offset = 2;
  bytes value = 3;
  fixed64 timestamp = 4;
}

message SnapshotChunk {
  int64 term = 1;
  string name = 2;
  bytes content = 3;
  int32 chunk_index = 4;
  int32 chunk_count = 5;
}

enum KeySortingType {
  UNKNOWN = 0;
  NATURAL = 1;
  HIERARCHICAL = 2;
}

message NewTermOptions {
  bool enable_notifications = 1;
  KeySortingType key_sorting = 2;
}

message NewTermRequest {
  string namespace = 1;
  int64 shard = 2;
  int64 term = 3;

  NewTermOptions options = 4;
}

message NewTermResponse {
  EntryId head_entry_id = 1;
}

message BecomeLeaderRequest {
  string namespace = 1;
  int64 shard = 2;

  int64 term = 3;
  uint32 replication_factor = 4;
  map<string, EntryId> follower_maps = 5;

  // features_supported contains the list of features that all members of the
  // quorum support. This enables feature negotiation during leader election
  // to support safe rolling upgrades where new and old nodes can coexist.
  repeated Feature features_supported = 6;
}

message AddFollowerRequest {
  string namespace = 1;
  int64 shard = 2;

  int64 term = 3;
  string follower_name = 4;
  EntryId follower_head_entry_id = 5;

  // If true, this follower is an observer that does not participate
  // in the replication quorum. Used for shard split catch-up.
  bool observer = 6;

  // For observer followers during shard split: the shard ID that the
  // receiving server should use for the replicated data. This allows
  // the parent leader to replicate data to a child shard on the same
  // server without conflicting with the parent's own controllers.
  optional int64 target_shard = 7;

  // For observer followers during shard split: the hash range that the
  // child shard should retain after receiving the parent's snapshot.
  // The child filters its database and WAL entries to only keep keys
  // whose hash falls within this range.
  optional io.oxia.proto.v1.Int32HashRange split_hash_range = 8;
}

message BecomeLeaderResponse {}

message AddFollowerResponse {}

message TruncateRequest {
  string namespace = 1;
  int64 shard = 2;

  int64 term = 3;
  EntryId head_entry_id = 4;
}

message TruncateResponse {
  EntryId head_entry_id = 1;
}

message Append {
  int64 term = 1;
  LogEntry entry = 2;
  int64 commit_offset = 3;
  optional uint32 previous_entry_crc = 4;
}

message Ack {
  int64 offset = 1;
}

message SnapshotResponse {
  int64 ack_offset = 1;
}

message DeleteShardRequest {
  string namespace = 1;
  int64 shard = 2;
  int64 term = 3;
}

message DeleteShardResponse {}

//// Remove Observer RPC

message RemoveObserverRequest {
  string namespace = 1;
  int64 shard = 2;        // parent shard ID
  int64 term = 3;
  string follower_name = 4;
  int64 target_shard = 5; // child shard ID — used to form the observer key
}

message RemoveObserverResponse {}

//// Status RPC

message GetStatusRequest {
  int64 shard = 1;
}

enum ServingStatus {
  NOT_MEMBER = 0;
  FENCED = 1;
  FOLLOWER = 2;
  LEADER = 3;
}

message GetStatusResponse {
  int64 term = 1;
  ServingStatus status = 2;

  int64 head_offset = 3;
  int64 commit_offset = 4;
}
