  # â”€â”€ Step 4: Manual approval + promote to official release â”€â”€
  promote:
    name: Promote to Release
    needs: [prepare, regret-basic-kv, regret-kv-cas, regret-kv-ephemeral, regret-kv-secondary-index, regret-kv-sequence]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.rc_tag }}
          fetch-depth: 0

      - name: Create official release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"
          RC_TAG="${{ needs.prepare.outputs.rc_tag }}"

          echo "Promoting ${RC_TAG} â†’ ${RELEASE_TAG}"
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG} (promoted from ${RC_TAG})"
          git push origin "${RELEASE_TAG}"

          echo "## Release Promoted" >> $GITHUB_STEP_SUMMARY
          echo "- **RC:** ${RC_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release:** ${RELEASE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "The existing Release workflow will now trigger automatically." >> $GITHUB_STEP_SUMMARY
