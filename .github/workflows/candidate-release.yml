name: Candidate Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      branch:
        description: 'Branch to release from'
        required: false
        default: 'main'
      duration:
        description: 'Regret test duration'
        required: false
        default: '3h'
      generators:
        description: 'Generators to test (space-separated)'
        required: false
        default: 'basic-kv kv-cas kv-ephemeral kv-secondary-index kv-sequence'
      checkpoint_every:
        description: 'Checkpoint interval'
        required: false
        default: '10m'

permissions:
  contents: write

concurrency:
  group: candidate-release
  cancel-in-progress: false

jobs:
  # ── Step 1: Calculate version and create RC tag ──
  prepare:
    name: Prepare RC
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      rc_tag: ${{ steps.calc.outputs.rc_tag }}
      release_tag: ${{ steps.calc.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Calculate version
        id: calc
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            echo "No existing version tags found, starting from v0.0.0"
            LATEST="v0.0.0"
          fi
          echo "Latest release: $LATEST"

          MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          case "${{ inputs.bump }}" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"

          RC=0
          while git tag | grep -q "^v${VERSION}-rc${RC}$"; do
            RC=$((RC + 1))
          done

          RC_TAG="v${VERSION}-rc${RC}"
          RELEASE_TAG="v${VERSION}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "rc_tag=${RC_TAG}" >> $GITHUB_OUTPUT
          echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT

          echo "## Version Calculation" >> $GITHUB_STEP_SUMMARY
          echo "- **Previous:** ${LATEST}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump:** ${{ inputs.bump }}" >> $GITHUB_STEP_SUMMARY
          echo "- **RC Tag:** ${RC_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Tag:** ${RELEASE_TAG}" >> $GITHUB_STEP_SUMMARY

      - name: Create RC tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.calc.outputs.rc_tag }}" -m "Release candidate ${{ steps.calc.outputs.rc_tag }}"
          git push origin "${{ steps.calc.outputs.rc_tag }}"

  # ── Step 2: Build & push RC Docker image ──
  build-image:
    name: Build RC Image
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.rc_tag }}

      - uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: oxia/oxia:${{ needs.prepare.outputs.rc_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`oxia/oxia:${{ needs.prepare.outputs.rc_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY

  # ── Step 3: Run regret correctness tests ──
  regret-test:
    name: Regret Correctness Test
    needs: [prepare, build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      API: ${{ secrets.REGRET_API_URL }}
      AUTH: "admin:${{ secrets.REGRET_PASSWORD }}"
      CANDIDATE: "oxia/oxia:${{ needs.prepare.outputs.rc_tag }}"
      STABLE: "oxia/oxia:latest"
    steps:
      - name: Validate
        run: |
          echo "Candidate: ${CANDIDATE}"
          echo "Stable:    ${STABLE}"
          echo "Duration:  ${{ inputs.duration }}"
          echo "Generators: ${{ inputs.generators }}"
          curl -sf "${API}/health" || { echo "ERROR: Regret API not reachable"; exit 1; }

      - name: Create hypotheses and start runs
        id: hypotheses
        run: |
          HYP_IDS=""
          FIRST_ID=""

          for gen in ${{ inputs.generators }}; do
            echo "Creating hypothesis: ci-${gen}..."
            RESULT=$(curl -sf -u "${AUTH}" "${API}/api/hypothesis" \
              -X POST -H 'Content-Type: application/json' \
              -d "{
                \"name\": \"ci-${gen}-${GITHUB_RUN_ID}\",
                \"generator\": \"${gen}\",
                \"adapter\": \"oxia\",
                \"duration\": \"${{ inputs.duration }}\",
                \"checkpoint_every\": \"${{ inputs.checkpoint_every }}\",
                \"tolerance\": {\"structural\":[{\"field\":\"version_id\",\"ignore\":true}]}
              }")
            ID=$(echo "$RESULT" | jq -r .id)
            echo "  Created: $ID ($gen)"

            # Start run
            curl -sf -u "${AUTH}" "${API}/api/hypothesis/${ID}/run" \
              -X POST -H 'Content-Type: application/json' -d '{}'

            HYP_IDS="${HYP_IDS} ${ID}"
            if [ -z "$FIRST_ID" ]; then FIRST_ID="$ID"; fi
          done

          echo "ids=${HYP_IDS}" >> $GITHUB_OUTPUT
          echo "first_id=${FIRST_ID}" >> $GITHUB_OUTPUT

      - name: Trigger upgrade test
        run: |
          SCENARIO_ID=$(curl -sf "${API}/api/chaos/scenarios" \
            | jq -r '.items[] | select(.name=="oxia-upgrade-test") | .id')

          if [ -n "$SCENARIO_ID" ] && [ "$SCENARIO_ID" != "null" ]; then
            echo "Injecting upgrade test (scenario: $SCENARIO_ID)..."
            curl -sf -u "${AUTH}" "${API}/api/chaos/scenarios/${SCENARIO_ID}/inject" \
              -X POST -H 'Content-Type: application/json' \
              -d "{
                \"overrides\": {
                  \"upgrade_test\": {
                    \"hypothesis_id\": \"${{ steps.hypotheses.outputs.first_id }}\",
                    \"candidate_image\": \"${CANDIDATE}\",
                    \"stable_image\": \"${STABLE}\"
                  }
                }
              }"
            echo "Upgrade test started."
          else
            echo "WARNING: oxia-upgrade-test scenario not found, skipping."
          fi

      - name: Wait for completion
        run: |
          echo "Polling every 5 minutes..."
          while true; do
            ALL_DONE=true
            for hyp_id in ${{ steps.hypotheses.outputs.ids }}; do
              STATUS=$(curl -sf "${API}/api/hypothesis/${hyp_id}/status")
              STATE=$(echo "$STATUS" | jq -r .status)
              OPS=$(echo "$STATUS" | jq -r '.progress.completed_ops // 0')
              ELAPSED=$(echo "$STATUS" | jq -r '.progress.elapsed_secs // 0')
              VIOLATIONS=$(echo "$STATUS" | jq -r '.progress.safety_violations // 0')
              echo "  $hyp_id: status=$STATE ops=$OPS elapsed=${ELAPSED}s violations=$VIOLATIONS"
              if [ "$STATE" = "running" ]; then ALL_DONE=false; fi
            done
            if [ "$ALL_DONE" = "true" ]; then break; fi
            sleep 300
          done

      - name: Check results
        id: results
        run: |
          FAILED=false
          for hyp_id in ${{ steps.hypotheses.outputs.ids }}; do
            STATUS=$(curl -sf "${API}/api/hypothesis/${hyp_id}/status")
            VIOLATIONS=$(echo "$STATUS" | jq -r '.progress.safety_violations // 0')
            FAILED_CK=$(echo "$STATUS" | jq -r '.progress.failed_checkpoints // 0')
            OPS=$(echo "$STATUS" | jq -r '.progress.completed_ops // 0')
            PASSED_CK=$(echo "$STATUS" | jq -r '.progress.passed_checkpoints // 0')
            if [ "$VIOLATIONS" != "0" ] || [ "$FAILED_CK" != "0" ]; then
              echo "FAIL $hyp_id: violations=$VIOLATIONS failed_checkpoints=$FAILED_CK"
              FAILED=true
            else
              echo "PASS $hyp_id: ops=$OPS checkpoints=$PASSED_CK"
            fi
          done
          echo "failed=${FAILED}" >> $GITHUB_OUTPUT

      - name: Cleanup hypotheses
        if: always()
        run: |
          for hyp_id in ${{ steps.hypotheses.outputs.ids }}; do
            curl -sf -u "${AUTH}" "${API}/api/hypothesis/${hyp_id}" -X DELETE || true
          done

      - name: Report
        if: always()
        run: |
          if [ "${{ steps.results.outputs.failed }}" = "true" ]; then
            echo "### :x: Regret Correctness Test Failed" >> $GITHUB_STEP_SUMMARY
            echo "**Candidate:** \`${CANDIDATE}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Duration:** ${{ inputs.duration }}" >> $GITHUB_STEP_SUMMARY
            echo "**Generators:** ${{ inputs.generators }}" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "### :white_check_mark: Regret Correctness Test Passed" >> $GITHUB_STEP_SUMMARY
            echo "**Candidate:** \`${CANDIDATE}\`" >> $GITHUB_STEP_SUMMARY
            echo "**Duration:** ${{ inputs.duration }}" >> $GITHUB_STEP_SUMMARY
            echo "**Generators:** ${{ inputs.generators }}" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Step 4: Manual approval + promote to official release ──
  promote:
    name: Promote to Release
    needs: [prepare, regret-test]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.rc_tag }}
          fetch-depth: 0

      - name: Create official release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RELEASE_TAG="${{ needs.prepare.outputs.release_tag }}"
          RC_TAG="${{ needs.prepare.outputs.rc_tag }}"

          echo "Promoting ${RC_TAG} → ${RELEASE_TAG}"
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG} (promoted from ${RC_TAG})"
          git push origin "${RELEASE_TAG}"

          echo "## Release Promoted" >> $GITHUB_STEP_SUMMARY
          echo "- **RC:** ${RC_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release:** ${RELEASE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "The existing Release workflow will now trigger automatically." >> $GITHUB_STEP_SUMMARY
