name: Release

on:
  push:
    tags:
      - 'v*'
  
  # Publish nightly builds
  schedule:
    - cron: '0 0 * * *' # run at midnight UTC

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build and test to ensure release is stable
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: true
          cache-dependency-path: "go.work.sum"

      - name: Install protoc
        run: |
          PROTOC_VERSION=34.1
          curl -fsSL -o protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -o protoc.zip -d /usr/local bin/protoc 'include/*'
          rm protoc.zip

      - name: Installing Go dependencies
        run: |
          go install github.com/palantir/go-license@latest
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.6.2

      - run: make license-check
      - name: Build
        run: make build
      - name: golangci-lint
        run: make lint
      - name: Test
        run: make test

  # Build cross-platform binaries
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: .exe
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.work'
          cache: 'true'
          cache-dependency-path: "go.work.sum"

      - name: Build binary with config
        run: |
          make release-build \
            OUTPUT_DIR=dist/oxia \
            OUTPUT_NAME=oxia${{ matrix.suffix }} \
            GOOS=${{ matrix.goos }} \
            GOARCH=${{ matrix.goarch }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: oxia-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/oxia/
          retention-days: 7

  # Build and publish Docker image
  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: oxia/oxia
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Always rebuild the runtime stage so `apk upgrade` picks up the
          # latest Alpine security patches instead of a cached layer.
          no-cache-filters: runtime

  # Create GitHub release with binaries and notes
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, publish-docker]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: "oxia-*-*"

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cd artifacts
          for dir in */; do
            cd "$dir"
            PLATFORM=${dir%/}
            if [[ $PLATFORM == windows* ]]; then
              zip -r "../../release-assets/oxia-${PLATFORM}.zip" *
            else
              tar --mode=a+x -czf "../../release-assets/oxia-${PLATFORM}.tar.gz" *
            fi
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            release-assets/*
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Clean up RC tags and releases when an official release is published
  cleanup-rc-tags:
    name: Cleanup RC Tags
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'beta') && !contains(github.ref_name, 'alpha')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Delete RC tags and releases
        run: |
          # Extract base version from tag (e.g., v0.16.2 -> v0.16.2)
          BASE_VERSION="${GITHUB_REF_NAME}"
          echo "Official release: ${BASE_VERSION}"

          # Find all RC tags matching this version
          RC_TAGS=$(git tag --list "${BASE_VERSION}-rc*")

          if [ -z "$RC_TAGS" ]; then
            echo "No RC tags found for ${BASE_VERSION}"
            exit 0
          fi

          echo "Found RC tags to clean up:"
          echo "$RC_TAGS"

          for TAG in $RC_TAGS; do
            echo "Processing ${TAG}..."

            # Delete the GitHub release if it exists
            if gh release view "$TAG" > /dev/null 2>&1; then
              echo "  Deleting GitHub release: ${TAG}"
              gh release delete "$TAG" --yes --cleanup-tag
            else
              echo "  No GitHub release found for ${TAG}, deleting tag only"
              # Delete remote tag
              git push origin --delete "refs/tags/${TAG}" || true
            fi
          done

          echo "RC tag cleanup complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
