name: Regret Correctness Test

on:
  # Trigger on release candidate tags
  push:
    tags:
      - 'v*-rc*'

  # Manual trigger
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to test (e.g. v0.5.0-rc1). If empty, builds from current branch.'
        required: false
      stable_tag:
        description: 'Stable image tag to downgrade to (default: latest)'
        required: false
        default: 'latest'
      duration:
        description: 'Test duration (e.g. 3h, 1h, 30m)'
        required: false
        default: '3h'

jobs:
  regret:
    name: Regret Correctness (${{ inputs.duration || '3h' }})
    uses: mattisonchao/regret/.github/workflows/oxia-candidate-test.yml@main
    with:
      candidate_image: "streamnative/oxia:${{ inputs.image_tag || github.ref_name }}"
      stable_image: "streamnative/oxia:${{ inputs.stable_tag || 'latest' }}"
      duration: ${{ inputs.duration || '3h' }}
    secrets:
      regret_api: ${{ secrets.REGRET_API_URL }}
      regret_password: ${{ secrets.REGRET_PASSWORD }}
      adapter_addr: ${{ secrets.REGRET_ADAPTER_ADDR }}
